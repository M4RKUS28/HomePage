# Local development override
# Usage: docker compose -f docker-compose.yml -f docker-compose.local.yml up --build
#
# - Mounts source code into containers (no rebuild needed on code changes)
# - FastAPI runs with --reload (uvicorn auto-restart on file changes)
# - Next.js runs in dev mode with Turbopack hot module replacement
# - MySQL port 3306 is exposed to host for local DB clients (e.g. DBeaver)

services:
  mysql:
    # Expose MySQL to the host in local dev so DB clients can connect directly
    ports:
      - "3306:3306"
    healthcheck:
      start_period: 15s
      interval: 10s

  minio:
    # Ports are already defined in the base compose file; no overrides needed
    healthcheck:
      start_period: 10s
      interval: 15s

  homepagebackend:
    # entrypoint.sh handles migration detection; CMD becomes the uvicorn dev server
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      # Mount source code – maps ./backend/src to the /home/app/web/app path
      # (the production Dockerfile does: COPY ./src ./app)
      - ./backend/src:/home/app/web/app
      - ./backend/.env:/home/app/web/.env:ro
      # Mount alembic so new migration files generated inside the container
      # are immediately available on the host (and vice versa)
      - ./backend/alembic:/home/app/web/alembic
      - ./backend/alembic.ini:/home/app/web/alembic.ini:ro
      - ./backend/entrypoint.sh:/home/app/web/entrypoint.sh:ro
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
    # Disable the healthcheck delay for faster local startup
    healthcheck:
      start_period: 5s
      interval: 10s

  nginx:
    volumes:
      - ./nginx/nginx.local.conf:/etc/nginx/nginx.conf:ro

  nextfrontend:
    # Use the lightweight dev Dockerfile instead of the production multi-stage build
    build:
      context: ./nextfrontend
      dockerfile: Dockerfile.dev
    volumes:
      # Mount full source code for HMR
      - ./nextfrontend/src:/app/src
      - ./nextfrontend/public:/app/public
      # Mount config files so changes take effect without rebuilding the image
      - ./nextfrontend/next.config.mjs:/app/next.config.mjs:ro
      - ./nextfrontend/postcss.config.mjs:/app/postcss.config.mjs:ro
      - ./nextfrontend/jsconfig.json:/app/jsconfig.json:ro
      - ./nextfrontend/eslint.config.mjs:/app/eslint.config.mjs:ro
      - ./nextfrontend/ecosystem.config.js:/app/ecosystem.config.js:ro
      - ./nextfrontend/package.json:/app/package.json:ro
      # Persist node_modules inside the container (avoids Windows/WSL path issues)
      - nextfrontend_node_modules:/app/node_modules
    environment:
      - NODE_ENV=development
      - BACKEND_URL=http://homepagebackend:8000
      - NEXT_TELEMETRY_DISABLED=1
    healthcheck:
      start_period: 15s
      interval: 10s

volumes:
  nextfrontend_node_modules:
