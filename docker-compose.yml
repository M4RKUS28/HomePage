services:
  mysql:
    image: mysql:8.0
    container_name: mysql
    # No ports exposed externally - only reachable within the Docker network
    expose:
      - "3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - app-network
    restart: always
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "--silent"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s

  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000" # S3-compatible API
      - "9001:9001" # Web console
    networks:
      - app-network
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: nginx
    ports:
      - "8457:80"
    networks:
      - app-network
    depends_on:
      homepagebackend:
        condition: service_healthy
      nextfrontend:
        condition: service_started
    restart: always

  homepagebackend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: homepagebackend
    # ports exposed only to internal network
    expose:
      - "8000"
    env_file:
      - ./backend/.env
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/docs"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - app-network
    restart: always

  nextfrontend:
    build:
      context: ./nextfrontend
      dockerfile: Dockerfile
    container_name: nextfrontend
    # ports exposed only to internal network
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - PM2_INSTANCES=${PM2_INSTANCES:-2}
      - BACKEND_URL=http://homepagebackend:8000
      - NEXT_TELEMETRY_DISABLED=1
    volumes:
      - ./nextfrontend/logs:/app/logs
    depends_on:
      homepagebackend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:3000",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  logs:
  mysql_data:
  minio_data:
