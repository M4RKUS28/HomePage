# =============================================================================
# docker-compose.yml  –  LOCAL DEVELOPMENT
#
# Usage:
#   docker compose up --build
#
# Features:
#   - Builds images locally (no DockerHub pull)
#   - Source code mounted for hot-reload (no image rebuild on code changes)
#   - Backend: uvicorn --reload
#   - Frontend: Next.js dev mode (Turbopack)
#   - PostgreSQL port exposed to host for DB clients (DBeaver, psql, etc.)
#   - MinIO console on :9001
# =============================================================================

services:
  # ── Infrastructure ──────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    ports:
      - "5432:5432" # exposed to host for local DB clients
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-homepage}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: redis
    expose:
      - "6379"
    command: >
      redis-server
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # Web console
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ── Application ─────────────────────────────────────────────────────────────

  homepagebackend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: homepagebackend
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /home/app/web/src
    expose:
      - "8000"
    env_file:
      - ./backend/.env
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
    volumes:
      # Mount source so --reload picks up changes without rebuild
      - ./backend/src:/home/app/web/src
      - ./backend/requirements.txt:/home/app/web/requirements.txt:ro
      - ./backend/.env:/home/app/web/.env:ro
      - ./backend/alembic:/home/app/web/alembic
      - ./backend/alembic.ini:/home/app/web/alembic.ini:ro
      - ./backend/entrypoint.sh:/home/app/web/entrypoint.sh:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/docs"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 10s
    networks:
      - app-network
    restart: unless-stopped

  nextfrontend:
    build:
      context: ./nextfrontend
      dockerfile: Dockerfile.dev
    container_name: nextfrontend
    expose:
      - "3000"
    environment:
      - NODE_ENV=development
      - BACKEND_URL=http://homepagebackend:8000
      - AUTH_INTERNAL_SHARED_SECRET=${AUTH_INTERNAL_SHARED_SECRET:-change-me-in-production}
      - SESSION_SECRET=${SESSION_SECRET:-iron-session-secret-at-least-32-chars-change-me}
      - NEXT_TELEMETRY_DISABLED=1
      # Polling required on Windows/WSL (inotify doesn't cross volume boundary)
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - ./nextfrontend/src:/app/src
      - ./nextfrontend/public:/app/public
      - ./nextfrontend/messages:/app/messages:ro
      - ./nextfrontend/next.config.mjs:/app/next.config.mjs:ro
      - ./nextfrontend/postcss.config.mjs:/app/postcss.config.mjs:ro
      - ./nextfrontend/jsconfig.json:/app/jsconfig.json:ro
      - ./nextfrontend/eslint.config.mjs:/app/eslint.config.mjs:ro
      - ./nextfrontend/package.json:/app/package.json:ro

    depends_on:
      homepagebackend:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:3000",
        ]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - app-network
    restart: unless-stopped

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: nginx
    ports:
      - "8457:80"
    volumes:
      # Relaxed local config (no strict rate-limits)
      - ./nginx/nginx.local.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      homepagebackend:
        condition: service_healthy
      nextfrontend:
        condition: service_started
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:
