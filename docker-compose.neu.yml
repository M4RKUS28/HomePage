services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    expose:
      - "5432"
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-homepage}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s

  redis:
    image: redis:7-alpine
    container_name: redis
    expose:
      - "6379"
    command: >
      redis-server
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - app-network
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000" # S3-compatible API
      - "9001:9001" # Web console
    networks:
      - app-network
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: nginx
    ports:
      - "8457:80"
    networks:
      - app-network
    depends_on:
      homepagebackend:
        condition: service_healthy
      nextfrontend:
        condition: service_started
    restart: always

  homepagebackend:
    build:
      context: ./backend
      dockerfile: Dockerfile.neu
    container_name: homepagebackend
    expose:
      - "8000"
    env_file:
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/docs"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - app-network
    restart: always

  nextfrontend:
    build:
      context: ./nextfrontend
      dockerfile: Dockerfile
    container_name: nextfrontend
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - PM2_INSTANCES=${PM2_INSTANCES:-2}
      - BACKEND_URL=http://homepagebackend:8000
      - AUTH_INTERNAL_SHARED_SECRET=${AUTH_INTERNAL_SHARED_SECRET:-change-me-in-production}
      - SESSION_SECRET=${SESSION_SECRET:-iron-session-secret-at-least-32-chars-change-me}
      - NEXT_TELEMETRY_DISABLED=1
    volumes:
      - ./nextfrontend/logs:/app/logs
    depends_on:
      homepagebackend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:3000",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  logs:
  postgres_data:
  redis_data:
  minio_data:
