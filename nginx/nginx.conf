events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # Rate limiting zones
    # API: 10 requests/second per IP, storing limits in 'api_limit' zone (10MB size)
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    # Frontend: 30 requests/second per IP
    limit_req_zone $binary_remote_addr zone=general_limit:10m rate=30r/s;
    
    server {
        listen 80;

        # Security Headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;

        # Block access to hidden files and sensitive extensions
        location ~* \.(env|git|yml|json|lock|log)$ {
            deny all;
            return 404;
        }

        # Serve static files from /public with caching
        location /public/ {
            alias /var/www/public/;
            expires 30d;
            add_header Cache-Control "public, max-age=2592000";
            access_log off;
        }

        # Handle Next.js static assets (/_next/)
        location /_next/ {
            proxy_pass http://nextfrontend:3000;
            proxy_http_version 1.1;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Server $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Host $host;

            # Only cache truly immutable chunks (hashed filenames); skip HMR paths
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        # All /api/* requests go to Next.js.
        # Next.js API routes handle iron-session auth (/api/auth/*)
        # and the catch-all proxy (/api/[...path]) forwards other calls
        # to the backend with a freshly signed JWT.
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass http://nextfrontend:3000;

            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        # Forward all other requests to the frontend service
        location / {
            limit_req zone=general_limit burst=50 nodelay;
            
            proxy_pass http://nextfrontend:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # WebSocket support for Next.js hot reload
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
