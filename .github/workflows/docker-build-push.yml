name: Build & Push Docker Images

on:
    push:
        branches:
            - main
        paths:
            - "backend/**"
            - "nextfrontend/**"
            - "nginx/**"
    workflow_dispatch: # allow manual trigger from GitHub UI

env:
    REGISTRY: docker.io

jobs:
    build-and-push:
        name: Build & Push to DockerHub
        runs-on: ubuntu-latest
        permissions:
            contents: read

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Log in to DockerHub
              uses: docker/login-action@v3
              with:
                  username: ${{ secrets.DOCKERHUB_USERNAME }}
                  password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Extract short SHA
              id: meta
              run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

            # ── Backend ─────────────────────────────────────────────────────────────

            - name: Build & push backend
              uses: docker/build-push-action@v6
              with:
                  context: ./backend
                  file: ./backend/Dockerfile
                  push: true
                  tags: |
                      ${{ secrets.DOCKERHUB_USERNAME }}/m4rkus-backend:latest
                      ${{ secrets.DOCKERHUB_USERNAME }}/m4rkus-backend:${{ steps.meta.outputs.sha_short }}
                  cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/m4rkus-backend:buildcache
                  cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/m4rkus-backend:buildcache,mode=max

            # ── Frontend ────────────────────────────────────────────────────────────

            - name: Build & push frontend
              uses: docker/build-push-action@v6
              with:
                  context: ./nextfrontend
                  file: ./nextfrontend/Dockerfile
                  push: true
                  tags: |
                      ${{ secrets.DOCKERHUB_USERNAME }}/m4rkus-frontend:latest
                      ${{ secrets.DOCKERHUB_USERNAME }}/m4rkus-frontend:${{ steps.meta.outputs.sha_short }}
                  cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/m4rkus-frontend:buildcache
                  cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/m4rkus-frontend:buildcache,mode=max

            # ── Nginx ───────────────────────────────────────────────────────────────

            - name: Build & push nginx
              uses: docker/build-push-action@v6
              with:
                  context: ./nginx
                  file: ./nginx/Dockerfile
                  push: true
                  tags: |
                      ${{ secrets.DOCKERHUB_USERNAME }}/m4rkus-nginx:latest
                      ${{ secrets.DOCKERHUB_USERNAME }}/m4rkus-nginx:${{ steps.meta.outputs.sha_short }}
                  cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/m4rkus-nginx:buildcache
                  cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/m4rkus-nginx:buildcache,mode=max
