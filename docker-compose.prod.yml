# =============================================================================
# docker-compose.prod.yml  –  PRODUCTION
#
# Usage:
#   docker compose -f docker-compose.prod.yml up -d
#
# Requires:
#   DOCKERHUB_USERNAME in root .env (or exported in shell)
#   All other vars from root .env / environment
#
# Images are pulled from DockerHub – no local build.
# Build & push is handled by the GitHub Actions workflow.
# =============================================================================

services:
  # ── Infrastructure ──────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    expose:
      - "5432"
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-homepage}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: redis
    expose:
      - "6379"
    command: >
      redis-server
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - app-network
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    expose:
      - "9000"
      - "9001"
    networks:
      - app-network
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ── Application ─────────────────────────────────────────────────────────────

  homepagebackend:
    image: ${DOCKERHUB_USERNAME}/m4rkus-backend:latest
    container_name: homepagebackend
    expose:
      - "8000"
    env_file:
      - ./backend/.env
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/docs"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 15s
    networks:
      - app-network
    restart: always

  nextfrontend:
    image: ${DOCKERHUB_USERNAME}/m4rkus-frontend:latest
    container_name: nextfrontend
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - BACKEND_URL=http://homepagebackend:8000
      - AUTH_INTERNAL_SHARED_SECRET=${AUTH_INTERNAL_SHARED_SECRET}
      - SESSION_SECRET=${SESSION_SECRET}
      - NEXT_TELEMETRY_DISABLED=1
      - PM2_INSTANCES=${PM2_INSTANCES:-2}
    volumes:
      - ./nextfrontend/logs:/app/logs
    depends_on:
      homepagebackend:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:3000",
        ]
      interval: 20s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - app-network
    restart: always

  nginx:
    image: ${DOCKERHUB_USERNAME}/m4rkus-nginx:latest
    container_name: nginx
    ports:
      - "8457:80"
    depends_on:
      homepagebackend:
        condition: service_healthy
      nextfrontend:
        condition: service_started
    networks:
      - app-network
    restart: always

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:
